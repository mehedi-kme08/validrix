# =============================================================================
# CI/CD Pipeline — Validrix
#
# Design decision: Matrix strategy across Python versions.
#   WHY: Framework libraries must run on the full supported range (3.11, 3.12).
#        A matrix catches regressions like deprecated syntax that silently works
#        on older interpreters but fails on newer ones.
#
# Pipeline stages:
#   1. lint        — ruff + mypy (fast feedback, < 60 s)
#   2. unit-tests  — pure Python tests, no Playwright/API keys required
#   3. build       — package wheel, verify install-ability
#   4. docker      — build image, smoke test
#   5. integration — Playwright E2E (skipped on forks, needs secrets)
#   6. release     — publish to PyPI (only on semver tags)
#
# Caching strategy:
#   - pip cache keyed on pyproject.toml hash — invalidated only on dep changes
#   - Playwright browser cache keyed on Playwright version
#
# Secret requirements (set in repository Settings → Secrets):
#   VALIDRIX_AI_ANTHROPIC_API_KEY  — for integration tests
#   PYPI_TOKEN                     — for release job
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:          # Allow manual trigger from GitHub UI

# Cancel in-progress runs on new push to same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_DEFAULT: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:

  # ── 1. Lint & Type Check ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check validrix/ tests/

      - name: Ruff format check
        run: ruff format --check validrix/ tests/

      - name: Mypy type check
        run: mypy validrix/


  # ── 2. Unit Tests ─────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=validrix \
            --cov-fail-under=0 \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == env.PYTHON_DEFAULT
        with:
          files: coverage.xml
          fail_ci_if_error: false


  # ── 3. Build & Install Verification ──────────────────────────────────────
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install build tools
        run: pip install hatch

      - name: Build wheel and sdist
        run: hatch build

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl
          python -c "import validrix; print(validrix.__version__)"
          validrix --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7


  # ── 4. Docker Build ───────────────────────────────────────────────────────
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: false
          tags: validrix:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — verify imports inside container
        run: |
          docker run --rm validrix:ci-${{ github.sha }} \
            python -c "import validrix; from validrix.cli.framework_cli import cli; print('OK')"


  # ── 5. Integration / E2E Tests ────────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker
    # Skip on forks (no secrets) and dependabot PRs
    if: |
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      VALIDRIX_AI__ANTHROPIC_API_KEY: ${{ secrets.VALIDRIX_AI__ANTHROPIC_API_KEY }}
      VALIDRIX_ENVIRONMENT: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run example tests
        run: |
          pytest tests/examples/ \
            -v \
            --tb=short \
            -m "not slow" \
        continue-on-error: false

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: validrix-reports
          path: validrix_reports/
          retention-days: 14


  # ── 6. Publish to PyPI ────────────────────────────────────────────────────
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, docker, integration]
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/validrix
    permissions:
      id-token: write     # Required for OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_TOKEN secret needed
        # Configure at: https://pypi.org/manage/project/validrix/settings/publishing/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
